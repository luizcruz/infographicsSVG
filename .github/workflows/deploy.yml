# Runs tests on every push and PR; deploys to GitHub Pages on master only.
# Requires GitHub Pages source to be set to "GitHub Actions" in:
#   Repository Settings → Pages → Source → GitHub Actions

name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Run library tests
        run: npm test

      - name: Install block dependencies
        run: npm install
        working-directory: wordpress-plugin/infographic-svg-block

      - name: Run block tests
        run: npm test
        working-directory: wordpress-plugin/infographic-svg-block

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
